<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aris AR - Final Master (Full Format)</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>

    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            touch-action: none; 
            background: #000; 
        }
        
        #joystick-zone { 
            position: fixed; 
            bottom: 30px; 
            left: 30px; 
            width: 120px; 
            height: 120px; 
            z-index: 3000; 
        }
        
        .btn-action {
            position: fixed; 
            width: 75px; 
            height: 75px;
            background: rgba(255, 255, 255, 0.15); 
            border: 4px solid #fff; 
            border-radius: 50%;
            color: white; 
            font-weight: bold; 
            z-index: 3000;
            display: flex; 
            align-items: center; 
            justify-content: center;
            user-select: none; 
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 0 15px rgba(0,0,0,0.5); 
            transition: all 0.1s;
        }
        
        #action-btn { 
            bottom: 50px; 
            right: 30px; 
            font-size: 32px; 
        } 
        
        #ex-btn { 
            bottom: 50px; 
            right: 125px; 
            font-size: 22px; 
        }

        #action-btn.active-combat { 
            background: rgba(78, 160, 238, 0.6); 
            border-color: #4ea0ee; 
            box-shadow: 0 0 25px #4ea0ee; 
            transform: scale(0.9); 
        }
        
        #action-btn.active-cafe { 
            background: rgba(255, 165, 0, 0.6); 
            border-color: #ffa500; 
            box-shadow: 0 0 25px #ffa500; 
            transform: scale(0.9); 
        }
        
        #ex-btn.active-ex { 
            background: rgba(160, 32, 240, 0.6); 
            border-color: #a020f0; 
            box-shadow: 0 0 30px #a020f0; 
            transform: scale(0.9); 
        }

        #switch-btn {
            position: fixed; 
            bottom: 145px; 
            right: 42px; 
            width: 50px; 
            height: 50px;
            background: rgba(0, 0, 0, 0.5); 
            border: 2px solid #fff; 
            border-radius: 10px;
            color: white; 
            font-size: 18px; 
            font-weight: bold; 
            z-index: 3000;
            display: flex; 
            align-items: center; 
            justify-content: center;
        }
    </style>
</head>

<body>
    <div id="joystick-zone"></div>
    <div id="switch-btn">S</div>
    <div id="ex-btn" class="btn-action">B</div>
    <div id="action-btn" class="btn-action">A</div>

    <a-scene 
        mindar-image="imageTargetSrc: targets.mind; missTolerance: 10000; stayVisible: true; filterMinCF: 0.0001; filterBeta: 0.001;" 
        renderer="colorManagement: true; antialias: true;" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">

        <a-assets>
            <a-asset-item id="mIdle" src="Movement/Walk_Idle.glb"></a-asset-item>
            <a-asset-item id="mWalk" src="Movement/Walk.glb"></a-asset-item>
            <a-asset-item id="mStop" src="Movement/Walk_Stop.glb"></a-asset-item>
            <a-asset-item id="aStart" src="Normal_Attack/Start.glb"></a-asset-item>
            <a-asset-item id="aMid" src="Normal_Attack/Mid.glb"></a-asset-item>
            <a-asset-item id="aEnd" src="Normal_Attack/End.glb"></a-asset-item>
            <a-asset-item id="cIdle" src="Cafe/Walk_Cafe_Idle.glb"></a-asset-item>
            <a-asset-item id="cWalk" src="Cafe/Walk_Cafe_Go.glb"></a-asset-item>
            <a-asset-item id="cInter" src="Cafe/Walk_Cafe_Inter.glb"></a-asset-item>
            <a-asset-item id="exSkill" src="EX/EX.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-light type="ambient" intensity="1.2"></a-light>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-entity id="aris-root" position="0 -0.8 0.01">
                <a-entity id="aris-rotation" rotation="0 0 0">
                    <a-gltf-model id="arisIdle" src="#mIdle" scale="0.3 0.3 0.3" visible="true" animation-mixer></a-gltf-model>
                    <a-gltf-model id="arisWalk" src="#mWalk" scale="0.3 0.3 0.3" visible="false" animation-mixer></a-gltf-model>
                    <a-gltf-model id="arisStop" src="#mStop" scale="0.3 0.3 0.3" visible="false"></a-gltf-model>
                    <a-gltf-model id="arisAtkStart" src="#aStart" scale="0.3 0.3 0.3" visible="false"></a-gltf-model>
                    <a-gltf-model id="arisAtkMid" src="#aMid" scale="0.3 0.3 0.3" visible="false" animation-mixer></a-gltf-model>
                    <a-gltf-model id="arisAtkEnd" src="#aEnd" scale="0.3 0.3 0.3" visible="false"></a-gltf-model>
                    <a-gltf-model id="cafeIdle" src="#cIdle" scale="0.3 0.3 0.3" visible="false" animation-mixer></a-gltf-model>
                    <a-gltf-model id="cafeWalk" src="#cWalk" scale="0.3 0.3 0.3" visible="false" animation-mixer></a-gltf-model>
                    <a-gltf-model id="cafeInter" src="#cInter" scale="0.3 0.3 0.3" visible="false"></a-gltf-model>
                    <a-gltf-model id="arisEX" src="#exSkill" scale="0.3 0.3 0.3" visible="false"></a-gltf-model>
                </a-entity>
            </a-entity>
        </a-entity>
    </a-scene>

    <script>
        const FPS = 24;
        const TARGET_STOP_FRAME = 48; 
        const STOP_DURATION_MS = (TARGET_STOP_FRAME / FPS) * 1000;

        const root = document.querySelector('#aris-root');
        const rotWrapper = document.querySelector('#aris-rotation');
        const actionBtn = document.getElementById('action-btn');
        const exBtn = document.getElementById('ex-btn');
        const switchBtn = document.getElementById('switch-btn');

        const models = {
            idle: document.querySelector('#arisIdle'),
            walk: document.querySelector('#arisWalk'),
            stop: document.querySelector('#arisStop'),
            atkStart: document.querySelector('#arisAtkStart'),
            atkMid: document.querySelector('#arisAtkMid'),
            atkEnd: document.querySelector('#arisAtkEnd'),
            cIdle: document.querySelector('#cafeIdle'),
            cWalk: document.querySelector('#cafeWalk'),
            cInter: document.querySelector('#cafeInter'),
            ex: document.querySelector('#arisEX')
        };

        let moveData = { x: 0, z: 0, active: false };
        let isActionActive = false; 
        let currentMode = 'combat'; 

        function showModel(type) {
            Object.keys(models).forEach(function(k) {
                models[k].setAttribute('visible', k === type);
            });
        }

        // --- SWITCH MODE (S) ---
        switchBtn.addEventListener('click', function() {
            if (isActionActive) return; 
            
            if (currentMode === 'combat') {
                currentMode = 'cafe';
                actionBtn.innerText = 'I';
                exBtn.style.display = 'none'; 
                showModel('cIdle');
            } else {
                currentMode = 'combat';
                actionBtn.innerText = 'A';
                exBtn.style.display = 'flex';
                showModel('idle');
            }
        });

        // --- ANIMATION EVENTS ---
        models.atkStart.addEventListener('animation-finished', function() {
            if (isActionActive) {
                showModel('atkMid');
            }
        });

        models.atkEnd.addEventListener('animation-finished', function() {
            if (!isActionActive && !moveData.active) {
                showModel('idle');
            }
        });

        models.ex.addEventListener('animation-finished', function() {
            isActionActive = false;
            exBtn.classList.remove('active-ex');
            
            if (!moveData.active) {
                if (currentMode === 'combat') {
                    showModel('idle');
                } else {
                    showModel('cIdle');
                }
            }
        });

        models.cInter.addEventListener('animation-finished', function() {
            isActionActive = false; 
            if (!moveData.active) {
                showModel('cIdle');
            }
        });

        // --- JOYSTICK ---
        const manager = nipplejs.create({
            zone: document.getElementById('joystick-zone'),
            mode: 'static', 
            position: {left: '70px', bottom: '70px'}, 
            color: 'cyan'
        });

        manager.on('move', function(evt, data) {
            if (isActionActive) return;
            
            moveData.active = true;
            moveData.x = data.vector.x;
            moveData.z = -data.vector.y;
            
            if (currentMode === 'combat') {
                showModel('walk');
            } else {
                showModel('cWalk');
            }
        });

        manager.on('end', function() {
            moveData.active = false;
            
            if (!isActionActive) {
                if (currentMode === 'combat') {
                    showModel('stop');
                    models.stop.removeAttribute('animation-mixer');
                    models.stop.setAttribute('animation-mixer', {clip: '*', loop: 'once', clampWhenFinished: true});
                    
                    setTimeout(function() {
                        if (!moveData.active && !isActionActive) {
                            showModel('idle');
                        }
                    }, STOP_DURATION_MS);
                } else { 
                    showModel('cIdle'); 
                }
            }
        });

        // --- NÚT B (EX SKILL) ---
        exBtn.addEventListener('touchstart', function(e) {
            e.preventDefault();
            if (isActionActive) return;
            
            isActionActive = true;
            moveData.active = false;
            exBtn.classList.add('active-ex');
            
            showModel('ex');
            models.ex.removeAttribute('animation-mixer');
            models.ex.setAttribute('animation-mixer', {clip: '*', loop: 'once', clampWhenFinished: true});
        });

        // --- NÚT A (NORMAL ATTACK / INTERACT) ---
        actionBtn.addEventListener('touchstart', function(e) {
            e.preventDefault();
            if (isActionActive) return;
            
            isActionActive = true;
            moveData.active = false; 
            
            if (currentMode === 'combat') {
                actionBtn.classList.add('active-combat');
                showModel('atkStart');
                models.atkStart.removeAttribute('animation-mixer');
                models.atkStart.setAttribute('animation-mixer', {clip: '*', loop: 'once', clampWhenFinished: true});
            } else {
                actionBtn.classList.add('active-cafe');
                showModel('cInter');
                models.cInter.removeAttribute('animation-mixer');
                models.cInter.setAttribute('animation-mixer', {clip: '*', loop: 'once', clampWhenFinished: true});
            }
        });

        actionBtn.addEventListener('touchend', function(e) {
            e.preventDefault();
            actionBtn.classList.remove('active-combat', 'active-cafe');
            
            if (!isActionActive) return;
            
            if (currentMode === 'combat' && !models.ex.getAttribute('visible')) {
                isActionActive = false;
                showModel('atkEnd');
                models.atkEnd.removeAttribute('animation-mixer');
                models.atkEnd.setAttribute('animation-mixer', {clip: '*', loop: 'once', clampWhenFinished: true});
            }
        });

        // --- GAME LOOP ---
        function update() {
            if (moveData.active && !isActionActive) {
                const speed = (currentMode === 'cafe') ? 0.025 : 0.05;
                
                let currPos = root.getAttribute('position');
                currPos.x += moveData.x * speed;
                currPos.z += moveData.z * speed;
                root.setAttribute('position', currPos);
                
                let angleDeg = Math.atan2(moveData.x, moveData.z) * (180 / Math.PI);
                rotWrapper.setAttribute('rotation', `0 ${angleDeg} 0`);
            }
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
