<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aris AR - Standard Enhanced</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; touch-action: none; background: #000; }
        #joystick-zone { position: fixed; bottom: 30px; left: 30px; width: 120px; height: 120px; z-index: 3000; }
        .btn-action {
            position: fixed; width: 75px; height: 75px;
            background: rgba(255, 255, 255, 0.15); border: 4px solid #fff; border-radius: 50%;
            color: white; font-weight: bold; z-index: 3000;
            display: flex; align-items: center; justify-content: center;
            user-select: none; -webkit-tap-highlight-color: transparent;
            box-shadow: 0 0 15px rgba(0,0,0,0.5); transition: all 0.1s; cursor: pointer;
        }
        #action-btn { bottom: 50px; right: 30px; font-size: 32px; } 
        #ex-btn { bottom: 50px; right: 125px; font-size: 22px; }
        #action-btn.active-combat { background: rgba(78, 160, 238, 0.6); border-color: #4ea0ee; box-shadow: 0 0 25px #4ea0ee; transform: scale(0.9); }
        #action-btn.active-cafe { background: rgba(255, 165, 0, 0.6); border-color: #ffa500; box-shadow: 0 0 25px #ffa500; transform: scale(0.9); }
        #ex-btn.active-ex { background: rgba(160, 32, 240, 0.6); border-color: #a020f0; box-shadow: 0 0 30px #a020f0; transform: scale(0.9); }
        #switch-btn {
            position: fixed; bottom: 145px; right: 42px; width: 50px; height: 50px;
            background: rgba(0, 0, 0, 0.5); border: 2px solid #fff; border-radius: 10px;
            color: white; font-size: 18px; font-weight: bold; z-index: 3000;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="joystick-zone"></div>
    <div id="switch-btn">S</div>
    <div id="ex-btn" class="btn-action">B</div>
    <div id="action-btn" class="btn-action">A</div>

    <a-scene mindar-image="imageTargetSrc: targets.mind; stayVisible: true;" renderer="colorManagement: true;">
        <a-assets>
            <a-asset-item id="mIdle" src="Movement/Walk_Idle.glb"></a-asset-item>
            <a-asset-item id="mWalk" src="Movement/Walk.glb"></a-asset-item>
            <a-asset-item id="mStop" src="Movement/Walk_Stop.glb"></a-asset-item>
            <a-asset-item id="aStart" src="Normal_Attack/Start.glb"></a-asset-item>
            <a-asset-item id="aMid" src="Normal_Attack/Mid.glb"></a-asset-item>
            <a-asset-item id="aEnd" src="Normal_Attack/End.glb"></a-asset-item>
            <a-asset-item id="cIdle" src="Cafe/Walk_Cafe_Idle.glb"></a-asset-item>
            <a-asset-item id="cWalk" src="Cafe/Walk_Cafe_Go.glb"></a-asset-item>
            <a-asset-item id="cInter" src="Cafe/Walk_Cafe_Inter.glb"></a-asset-item>
            <a-asset-item id="exSkill" src="EX/EX.glb"></a-asset-item>

            <audio id="snd-cafe-1" src="SFX/Cafe/Alice_Cafe_Act_1.ogg"></audio>
            <audio id="snd-cafe-2" src="SFX/Cafe/Alice_Cafe_Act_2.ogg"></audio>
            <audio id="snd-cafe-3" src="SFX/Cafe/Alice_Cafe_Act_3.ogg"></audio>
            <audio id="snd-cafe-4" src="SFX/Cafe/Alice_Cafe_Act_4.ogg"></audio>
            <audio id="snd-cafe-5" src="SFX/Cafe/Alice_Cafe_Act_5.ogg"></audio>
            <audio id="snd-shout-1" src="SFX/Fire/Normal/Alice_Battle_Shout_1.ogg"></audio>
            <audio id="snd-shout-2" src="SFX/Fire/Normal/Alice_Battle_Shout_2.ogg"></audio>
            <audio id="snd-shout-3" src="SFX/Fire/Normal/Alice_Battle_Shout_3.ogg"></audio>
            <audio id="snd-ex-v1" src="SFX/Fire/EX/Alice_ExSkill_1.ogg"></audio>
            <audio id="snd-ex-v2" src="SFX/Fire/EX/Alice_ExSkill_2.ogg"></audio>
            <audio id="snd-ex-v3" src="SFX/Fire/EX/Alice_ExSkill_3.ogg"></audio>
            <audio id="snd-ex-l1" src="SFX/Fire/EX/Alice_ExSkill_Level_1.ogg"></audio>
            <audio id="snd-ex-l2" src="SFX/Fire/EX/Alice_ExSkill_Level_2.ogg"></audio>
            <audio id="snd-ex-l3" src="SFX/Fire/EX/Alice_ExSkill_Level_3.ogg"></audio>
            <audio id="snd-gun-normal" src="SFX/Gun/Normal.mp3"></audio>
            <audio id="snd-gun-ex" src="SFX/Gun/EX.mp3"></audio>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity mindar-image-target="targetIndex: 0">
            <a-entity id="aris-root" position="0 -0.8 0.01">
                <a-entity id="aris-rotation" rotation="0 0 0">
                    <a-gltf-model id="arisIdle" src="#mIdle" visible="true" animation-mixer></a-gltf-model>
                    <a-gltf-model id="arisWalk" src="#mWalk" visible="false" animation-mixer></a-gltf-model>
                    <a-gltf-model id="arisStop" src="#mStop" visible="false" animation-mixer="loop:once;clampWhenFinished:true"></a-gltf-model>
                    <a-gltf-model id="arisAtkStart" src="#aStart" visible="false"></a-gltf-model>
                    <a-gltf-model id="arisAtkMid" src="#aMid" visible="false" animation-mixer></a-gltf-model>
                    <a-gltf-model id="arisAtkEnd" src="#aEnd" visible="false"></a-gltf-model>
                    <a-gltf-model id="cafeIdle" src="#cIdle" visible="false" animation-mixer></a-gltf-model>
                    <a-gltf-model id="cafeWalk" src="#cWalk" visible="false" animation-mixer></a-gltf-model>
                    <a-gltf-model id="cafeInter" src="#cInter" visible="false"></a-gltf-model>
                    <a-gltf-model id="arisEX" src="#exSkill" visible="false"></a-gltf-model>
                </a-entity>
            </a-entity>
        </a-entity>
    </a-scene>

    <script>
        const FPS = 24;
        const LOOP_SYNC_SEC = 17 / FPS; // 0.708s
        const SOUND_TIMING = { normalGunFrame: 5, exGunFrame: 12 };

        let currentMode = 'combat';
        let isActionActive = false;
        let atkCount = 0;
        let exCount = 0;
        let cafeTimer = null;
        let gunDelayTimeout = null;
        let lastMidTime = 0; // Biến check sync âm thanh

        const actionBtn = document.getElementById('action-btn');
        const exBtn = document.getElementById('ex-btn');
        const sndNormal = document.getElementById('snd-gun-normal');
        const models = {
            idle: document.querySelector('#arisIdle'), walk: document.querySelector('#arisWalk'),
            stop: document.querySelector('#arisStop'), atkStart: document.querySelector('#arisAtkStart'),
            atkMid: document.querySelector('#arisAtkMid'), atkEnd: document.querySelector('#arisAtkEnd'),
            cIdle: document.querySelector('#cafeIdle'), cWalk: document.querySelector('#cafeWalk'),
            cInter: document.querySelector('#cafeInter'), ex: document.querySelector('#arisEX')
        };

        function showModel(type) {
            Object.keys(models).forEach(k => models[k].setAttribute('visible', k === type));
        }

        function stopSound(id) {
            const s = document.getElementById(id);
            if(s) { s.pause(); s.currentTime = 0; }
        }

        function playSound(id, loop = false) {
            const s = document.getElementById(id);
            if(s) {
                s.pause(); s.currentTime = 0;
                s.loop = loop;
                s.play().catch(e => {});
            }
        }

        function triggerGunSFX(mode) {
            const frame = (mode === 'normal') ? SOUND_TIMING.normalGunFrame : SOUND_TIMING.exGunFrame;
            const id = (mode === 'normal') ? 'snd-gun-normal' : 'snd-gun-ex';
            clearTimeout(gunDelayTimeout);
            gunDelayTimeout = setTimeout(() => {
                if(isActionActive) playSound(id, (mode === 'ex'));
            }, (frame / FPS) * 1000);
        }

        function startCafeVoice() {
            if(cafeTimer) clearInterval(cafeTimer);
            cafeTimer = setInterval(() => {
                if(currentMode === 'cafe' && !isActionActive) {
                    const voiceIds = ['snd-cafe-1', 'snd-cafe-2', 'snd-cafe-3', 'snd-cafe-4', 'snd-cafe-5'];
                    const pick = voiceIds[Math.floor(Math.random() * voiceIds.length)];
                    voiceIds.forEach(id => stopSound(id));
                    playSound(pick);
                }
            }, 15000);
        }

        function onActionStart(e) {
            if (e.cancelable) e.preventDefault();
            if (isActionActive) return;
            isActionActive = true;
            if (currentMode === 'combat') {
                atkCount++;
                actionBtn.classList.add('active-combat');
                showModel('atkStart');
                triggerGunSFX('normal');
                if(atkCount % 3 === 0) {
                    const shouts = ['snd-shout-1', 'snd-shout-2', 'snd-shout-3'];
                    playSound(shouts[Math.floor(Math.random() * shouts.length)]);
                }
                models.atkStart.setAttribute('animation-mixer', {clip: '*', loop: 'once', clampWhenFinished: true});
            } else {
                actionBtn.classList.add('active-cafe');
                showModel('cInter');
                models.cInter.setAttribute('animation-mixer', {clip: '*', loop: 'once', clampWhenFinished: true});
            }
        }

        function onActionEnd() {
            if (!isActionActive || models.ex.getAttribute('visible') === 'true') return;
            isActionActive = false;
            actionBtn.classList.remove('active-combat', 'active-cafe');
            if (currentMode === 'combat') {
                stopSound('snd-gun-normal'); 
                showModel('atkEnd');
                models.atkEnd.setAttribute('animation-mixer', {clip: '*', loop: 'once', clampWhenFinished: true});
            }
        }

        function onEXStart(e) {
            if (e.cancelable) e.preventDefault();
            if (isActionActive) return;
            isActionActive = true;
            exCount++;
            exBtn.classList.add('active-ex');
            showModel('ex');
            triggerGunSFX('ex');
            if(exCount % 2 !== 0) {
                const voices = ['snd-ex-v1', 'snd-ex-v2', 'snd-ex-v3', 'snd-ex-l1', 'snd-ex-l2', 'snd-ex-l3'];
                playSound(voices[Math.floor(Math.random() * voices.length)]);
            }
            models.ex.setAttribute('animation-mixer', {clip: '*', loop: 'once', clampWhenFinished: true});
        }

        actionBtn.addEventListener('mousedown', onActionStart);
        actionBtn.addEventListener('touchstart', onActionStart);
        window.addEventListener('mouseup', onActionEnd);
        window.addEventListener('touchend', (e) => { if(e.target === actionBtn) onActionEnd(); });
        exBtn.addEventListener('mousedown', onEXStart);
        exBtn.addEventListener('touchstart', onEXStart);

        models.atkStart.addEventListener('animation-finished', () => { if(isActionActive) showModel('atkMid'); });
        models.ex.addEventListener('animation-finished', () => { isActionActive = false; exBtn.classList.remove('active-ex'); stopSound('snd-gun-ex'); showModel(currentMode === 'combat' ? 'idle' : 'cIdle'); });
        models.cInter.addEventListener('animation-finished', () => { isActionActive = false; showModel('cIdle'); });
        models.atkEnd.addEventListener('animation-finished', () => { if(!isActionActive && !moveData.active) showModel('idle'); });

        document.getElementById('switch-btn').addEventListener('click', () => {
            if (isActionActive) return;
            if (currentMode === 'combat') {
                currentMode = 'cafe'; actionBtn.innerText = 'I'; exBtn.style.display = 'none';
                showModel('cIdle');
                startCafeVoice();
            } else {
                currentMode = 'combat'; actionBtn.innerText = 'A'; exBtn.style.display = 'flex';
                showModel('idle');
                clearInterval(cafeTimer); cafeTimer = null;
            }
        });

        const manager = nipplejs.create({zone: document.getElementById('joystick-zone'), mode: 'static', position: {left: '70px', bottom: '70px'}, color: 'cyan'});
        let moveData = { x: 0, z: 0, active: false };
        manager.on('move', (evt, data) => { 
            if (isActionActive) return; moveData.active = true; moveData.x = data.vector.x; moveData.z = -data.vector.y; 
            showModel(currentMode === 'combat' ? 'walk' : 'cWalk');
        });
        manager.on('end', () => { 
            moveData.active = false; 
            if(!isActionActive) {
                if(currentMode === 'combat') {
                    showModel('stop');
                    // Tự động về Idle sau 2s (thời gian stop GLB)
                    setTimeout(() => { if(!moveData.active && !isActionActive) showModel('idle'); }, 2000);
                } else {
                    showModel('cIdle');
                }
            }
        });

        function update() {
            if (moveData.active && !isActionActive) {
                const speed = (currentMode === 'cafe') ? 0.015 : 0.05;
                let currPos = document.getElementById('aris-root').getAttribute('position');
                currPos.x += moveData.x * speed; currPos.z += moveData.z * speed;
                document.getElementById('aris-root').setAttribute('position', currPos);
                document.getElementById('aris-rotation').setAttribute('rotation', `0 ${Math.atan2(moveData.x, moveData.z) * 180 / Math.PI} 0`);
            }
            // ĐẮP THÊM: Logic Sync âm thanh súng (Frame 17)
            if (isActionActive && models.atkMid.getAttribute('visible') === 'true') {
                const mixer = models.atkMid.components['animation-mixer'].mixer;
                if (mixer && mixer._actions[0]) {
                    let cur = mixer._actions[0].time;
                    if (cur < lastMidTime) { // Animation lặp lại
                        sndNormal.currentTime = LOOP_SYNC_SEC;
                        sndNormal.play().catch(()=>{});
                    }
                    lastMidTime = cur;
                }
            }
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
