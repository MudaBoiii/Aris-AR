<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aris AR - Standing Mode</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; touch-action: none; background: #000; }
        #joystick-zone { position: fixed; bottom: 30px; left: 30px; width: 120px; height: 120px; z-index: 3000; }
        .btn-action {
            position: fixed; width: 75px; height: 75px; 
            background: rgba(255, 255, 255, 0.2); 
            border: 3px solid #fff; border-radius: 50%; 
            z-index: 3000; display: flex; align-items: center; justify-content: center; 
            user-select: none; -webkit-tap-highlight-color: transparent; 
            transition: all 0.1s ease-out; cursor: pointer;
            background-size: 70%; background-repeat: no-repeat; background-position: center;
        }
        #action-btn { bottom: 50px; right: 30px; width: 85px; height: 85px; }
        .mode-combat-icon { background-image: url('Icon/Normal.png'); }
        .mode-cafe-icon { background-image: url('Icon/Aris_Sticker.png'); background-size: 80%; }
        #ex-btn { bottom: 60px; right: 135px; width: 65px; height: 65px; background-image: url('Icon/EX.png'); }
        #switch-btn {
            position: fixed; bottom: 155px; right: 45px; width: 55px; height: 55px;
            background: rgba(0, 0, 0, 0.6); border: 2px solid #fff; border-radius: 12px;
            z-index: 3000; cursor: pointer;
            background-image: url('Icon/GDD.png'); background-size: 80%; background-repeat: no-repeat; background-position: center;
        }
        .btn-action:active, #switch-btn:active { filter: brightness(1.5); }
        #action-btn.active-combat { background-color: rgba(78, 160, 238, 0.6); transform: scale(0.9); box-shadow: 0 0 25px #4ea0ee; }
        #action-btn.active-cafe { background-color: rgba(255, 165, 0, 0.6); transform: scale(0.9); box-shadow: 0 0 25px #ffa500; }
        #ex-btn.active-ex { background-color: rgba(160, 32, 240, 0.6); transform: scale(0.9); box-shadow: 0 0 30px #a020f0; }
    </style>
</head>
<body>
    <div id="joystick-zone"></div>
    <div id="switch-btn"></div>
    <div id="ex-btn" class="btn-action"></div>
    <div id="action-btn" class="btn-action mode-combat-icon"></div>

    <a-scene mindar-image="imageTargetSrc: targets.mind; missTolerance: 10000; stayVisible: true;" renderer="colorManagement: true; antialias: true;" vr-mode-ui="enabled: false">
        <a-assets>
            <a-asset-item id="mIdle" src="Movement/Walk_Idle.glb"></a-asset-item>
            <a-asset-item id="mWalk" src="Movement/Walk.glb"></a-asset-item>
            <a-asset-item id="mStop" src="Movement/Walk_Stop.glb"></a-asset-item>
            <a-asset-item id="aStart" src="Normal_Attack/Start.glb"></a-asset-item>
            <a-asset-item id="aMid" src="Normal_Attack/Mid.glb"></a-asset-item>
            <a-asset-item id="aEnd" src="Normal_Attack/End.glb"></a-asset-item>
            <a-asset-item id="cIdle" src="Cafe/Walk_Cafe_Idle.glb"></a-asset-item>
            <a-asset-item id="cWalk" src="Cafe/Walk_Cafe_Go.glb"></a-asset-item>
            <a-asset-item id="cInter" src="Cafe/Walk_Cafe_Inter.glb"></a-asset-item>
            <a-asset-item id="exSkill" src="EX/EX.glb"></a-asset-item>
            </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        
        <a-entity mindar-image-target="targetIndex: 0">
            <a-entity id="aris-root" position="0 0 0.1" rotation="90 0 0">
                <a-entity id="aris-rotation">
                    <a-gltf-model id="arisIdle" src="#mIdle" scale="0.3 0.3 0.3" visible="true" animation-mixer></a-gltf-model>
                    <a-gltf-model id="arisWalk" src="#mWalk" scale="0.3 0.3 0.3" visible="false" animation-mixer></a-gltf-model>
                    <a-gltf-model id="arisStop" src="#mStop" scale="0.3 0.3 0.3" visible="false" animation-mixer="loop:once; clampWhenFinished:true"></a-gltf-model>
                    <a-gltf-model id="arisAtkStart" src="#aStart" scale="0.3 0.3 0.3" visible="false" animation-mixer="loop:once; clampWhenFinished:true"></a-gltf-model>
                    <a-gltf-model id="arisAtkMid" src="#aMid" scale="0.3 0.3 0.3" visible="false" animation-mixer="loop:repeat"></a-gltf-model>
                    <a-gltf-model id="arisAtkEnd" src="#aEnd" scale="0.3 0.3 0.3" visible="false" animation-mixer="loop:once; clampWhenFinished:true"></a-gltf-model>
                    <a-gltf-model id="cafeIdle" src="#cIdle" scale="0.3 0.3 0.3" visible="false" animation-mixer></a-gltf-model>
                    <a-gltf-model id="cafeWalk" src="#cWalk" scale="0.3 0.3 0.3" visible="false" animation-mixer></a-gltf-model>
                    <a-gltf-model id="cafeInter" src="#cInter" scale="0.3 0.3 0.3" visible="false" animation-mixer="loop:once; clampWhenFinished:true"></a-gltf-model>
                    <a-gltf-model id="arisEX" src="#exSkill" scale="0.3 0.3 0.3" visible="false" animation-mixer="loop:once; clampWhenFinished:true"></a-gltf-model>
                </a-entity>
            </a-entity>
        </a-entity>
    </a-scene>

    <script>
        // Các biến logic giữ nguyên
        let currentMode = 'combat', isActionActive = false, isEXRunning = false, lastMidTime = 0;
        let cafeVoiceTimeout = null, stopTimer = null;
        let moveData = { x: 0, y: 0, active: false }; // Đổi z thành y cho đúng hệ tọa độ phẳng

        const models = {
            idle: document.querySelector('#arisIdle'), walk: document.querySelector('#arisWalk'),
            stop: document.querySelector('#arisStop'), atkStart: document.querySelector('#arisAtkStart'),
            atkMid: document.querySelector('#arisAtkMid'), atkEnd: document.querySelector('#arisAtkEnd'),
            cIdle: document.querySelector('#cafeIdle'), cWalk: document.querySelector('#cafeWalk'),
            cInter: document.querySelector('#cafeInter'), ex: document.querySelector('#arisEX')
        };

        const actionBtn = document.getElementById('action-btn'), exBtn = document.getElementById('ex-btn');

        function playAnimation(modelKey) {
            const el = models[modelKey];
            if (el && el.components['animation-mixer']) {
                const mixer = el.components['animation-mixer'].mixer;
                if (mixer) {
                    mixer.stopAllAction();
                    const action = mixer.clipAction(mixer._root.animations[0]);
                    if (action) { action.reset().play(); }
                }
            }
        }

        function showModel(type) { 
            playAnimation(type);
            Object.keys(models).forEach(k => {
                models[k].setAttribute('visible', k === type);
                if (k !== type && ['atkStart', 'atkMid', 'atkEnd', 'ex', 'cInter', 'stop'].includes(k)) {
                    if (models[k].components['animation-mixer']?.mixer) models[k].components['animation-mixer'].mixer.stopAllAction();
                }
            }); 
        }

        // Logic SFX & Action giữ nguyên như bản trước của bạn...
        // (Vui lòng giữ lại các hàm onAStart, onAEnd, onEXClick từ code cũ)

        // --- Cập nhật JOYSTICK và TRỤC TỌA ĐỘ ---
        const manager = nipplejs.create({zone: document.getElementById('joystick-zone'), mode: 'static', position: {left: '70px', bottom: '70px'}, color: 'cyan'});
        
        manager.on('move', (evt, data) => {
            if (isActionActive || isEXRunning) return;
            if (stopTimer) { clearTimeout(stopTimer); stopTimer = null; }
            moveData.active = true;
            // Map lại trục: Joystick Y (lên/xuống) giờ là di chuyển theo trục Y của thực thể (tiến sâu vào/ra khỏi ảnh)
            moveData.x = data.vector.x; 
            moveData.y = data.vector.y; 
            showModel(currentMode === 'combat' ? 'walk' : 'cWalk');
        });

        manager.on('end', () => {
            moveData.active = false;
            if (!isActionActive && !isEXRunning) {
                if (currentMode === 'combat') {
                    showModel('stop'); 
                    stopTimer = setTimeout(() => { if (!moveData.active) showModel('idle'); }, 1500);
                } else showModel('cIdle');
            }
        });

        models.stop.addEventListener('animation-finished', () => {
            if (!moveData.active && !isActionActive && !isEXRunning) showModel('idle');
        });

        function update() {
            if (moveData.active && !isActionActive && !isEXRunning) {
                const root = document.querySelector('#aris-root'), rot = document.querySelector('#aris-rotation');
                let currPos = root.getAttribute('position');
                let speed = currentMode === 'combat' ? 0.05 : 0.015;

                // CẬP NHẬT TỌA ĐỘ:
                // x: trái/phải trên mặt ảnh
                // y: tiến/lùi vuông góc với mặt ảnh
                currPos.x += moveData.x * speed;
                currPos.y += moveData.y * speed; 
                
                root.setAttribute('position', currPos);
                
                // Xoay nhân vật theo hướng di chuyển (atan2 của x và y)
                let angle = Math.atan2(moveData.x, moveData.y) * (180 / Math.PI);
                rot.setAttribute('rotation', `0 0 ${-angle}`); // Trục Z lúc này là trục xoay thân khi đã quay Root 90 độ X
            }
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
