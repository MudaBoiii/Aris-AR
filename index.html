<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aris AR - The Hero's Adventure</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; touch-action: none; background: #000; }
        #joystick-zone { position: fixed; bottom: 30px; left: 30px; width: 120px; height: 120px; z-index: 3000; }
        .btn-action {
            position: fixed; width: 75px; height: 75px; 
            background: rgba(255, 255, 255, 0.2); 
            border: 3px solid #fff; border-radius: 50%; 
            z-index: 3000; display: flex; align-items: center; justify-content: center; 
            user-select: none; -webkit-tap-highlight-color: transparent; 
            transition: all 0.1s ease-out; cursor: pointer;
            background-size: 70%; background-repeat: no-repeat; background-position: center;
            filter: brightness(1);
        }
        #action-btn { bottom: 50px; right: 30px; width: 85px; height: 85px; }
        .mode-combat-icon { background-image: url('Icon/Normal.png'); }
        .mode-cafe-icon { background-image: url('Icon/Aris_Sticker.png'); background-size: 80%; }
        #ex-btn { bottom: 60px; right: 135px; width: 65px; height: 65px; background-image: url('Icon/EX.png'); }
        #switch-btn {
            position: fixed; bottom: 155px; right: 45px; width: 55px; height: 55px;
            background: rgba(0, 0, 0, 0.6); border: 2px solid #fff; border-radius: 12px;
            z-index: 3000; cursor: pointer;
            background-image: url('Icon/GDD.png');
            background-size: 80%; background-repeat: no-repeat; background-position: center;
            transition: all 0.1s;
        }
        .btn-action:active, #switch-btn:active { filter: brightness(1.5); }
        #action-btn.active-combat { background-color: rgba(78, 160, 238, 0.6); transform: scale(0.9); box-shadow: 0 0 25px #4ea0ee; filter: brightness(1.8); }
        #action-btn.active-cafe { background-color: rgba(255, 165, 0, 0.6); transform: scale(0.9); box-shadow: 0 0 25px #ffa500; filter: brightness(1.5); }
        #ex-btn.active-ex { background-color: rgba(160, 32, 240, 0.6); transform: scale(0.9); box-shadow: 0 0 30px #a020f0; filter: brightness(1.5); }
        #switch-btn:active { transform: scale(0.95); background-color: rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body>
    <div id="joystick-zone"></div>
    <div id="switch-btn"></div>
    <div id="ex-btn" class="btn-action"></div>
    <div id="action-btn" class="btn-action mode-combat-icon"></div>

    <a-scene mindar-image="imageTargetSrc: targets.mind; missTolerance: 10000; stayVisible: true;" renderer="colorManagement: true; antialias: true;" vr-mode-ui="enabled: false">
        <a-assets>
            <a-asset-item id="mIdle" src="Movement/Walk_Idle.glb"></a-asset-item>
            <a-asset-item id="mWalk" src="Movement/Walk.glb"></a-asset-item>
            <a-asset-item id="mStop" src="Movement/Walk_Stop.glb"></a-asset-item>
            <a-asset-item id="aStart" src="Normal_Attack/Start.glb"></a-asset-item>
            <a-asset-item id="aMid" src="Normal_Attack/Mid.glb"></a-asset-item>
            <a-asset-item id="aEnd" src="Normal_Attack/End.glb"></a-asset-item>
            <a-asset-item id="cIdle" src="Cafe/Walk_Cafe_Idle.glb"></a-asset-item>
            <a-asset-item id="cWalk" src="Cafe/Walk_Cafe_Go.glb"></a-asset-item>
            <a-asset-item id="cInter" src="Cafe/Walk_Cafe_Inter.glb"></a-asset-item>
            <a-asset-item id="exSkill" src="EX/EX.glb"></a-asset-item>

            <audio id="snd-cafe-1" src="SFX/Cafe/Alice_Cafe_Act_1.ogg"></audio>
            <audio id="snd-cafe-2" src="SFX/Cafe/Alice_Cafe_Act_2.ogg"></audio>
            <audio id="snd-cafe-3" src="SFX/Cafe/Alice_Cafe_Act_3.ogg"></audio>
            <audio id="snd-cafe-4" src="SFX/Cafe/Alice_Cafe_Act_4.ogg"></audio>
            <audio id="snd-cafe-5" src="SFX/Cafe/Alice_Cafe_Act_5.ogg"></audio>
            
            <audio id="snd-inter-1" src="SFX/Inter/Inter1.mp3"></audio>
            <audio id="snd-inter-2" src="SFX/Inter/Inter2.mp3"></audio>
            <audio id="snd-inter-3" src="SFX/Inter/Inter3.mp3"></audio>

            <audio id="snd-ex-v1" src="SFX/Fire/EX/Alice_ExSkill_1.ogg"></audio>
            <audio id="snd-ex-v2" src="SFX/Fire/EX/Alice_ExSkill_2.ogg"></audio>
            <audio id="snd-ex-v3" src="SFX/Fire/EX/Alice_ExSkill_3.ogg"></audio>
            <audio id="snd-ex-l1" src="SFX/Fire/EX/Alice_ExSkill_Level_1.ogg"></audio>
            <audio id="snd-ex-l2" src="SFX/Fire/EX/Alice_ExSkill_Level_2.ogg"></audio>
            <audio id="snd-ex-l3" src="SFX/Fire/EX/Alice_ExSkill_Level_3.ogg"></audio>
            <audio id="snd-gun-1" src="SFX/Gun/Normal1.mp3"></audio>
            <audio id="snd-gun-2" src="SFX/Gun/Normal2.mp3"></audio>
            <audio id="snd-gun-3" src="SFX/Gun/Normal3.mp3"></audio>
            <audio id="snd-gun-ex" src="SFX/Gun/EX.mp3"></audio>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity mindar-image-target="targetIndex: 0">
            <a-entity id="aris-root" position="0 -0.8 0.01">
                <a-entity id="aris-rotation">
                    <a-gltf-model id="arisIdle" src="#mIdle" scale="0.3 0.3 0.3" visible="true" animation-mixer></a-gltf-model>
                    <a-gltf-model id="arisWalk" src="#mWalk" scale="0.3 0.3 0.3" visible="false" animation-mixer></a-gltf-model>
                    <a-gltf-model id="arisStop" src="#mStop" scale="0.3 0.3 0.3" visible="false" animation-mixer="loop:once; clampWhenFinished:true"></a-gltf-model>
                    <a-gltf-model id="arisAtkStart" src="#aStart" scale="0.3 0.3 0.3" visible="false" animation-mixer="loop:once; clampWhenFinished:true"></a-gltf-model>
                    <a-gltf-model id="arisAtkMid" src="#aMid" scale="0.3 0.3 0.3" visible="false" animation-mixer="loop:once; clampWhenFinished:true"></a-gltf-model>
                    <a-gltf-model id="arisAtkEnd" src="#aEnd" scale="0.3 0.3 0.3" visible="false" animation-mixer="loop:once; clampWhenFinished:true"></a-gltf-model>
                    <a-gltf-model id="cafeIdle" src="#cIdle" scale="0.3 0.3 0.3" visible="false" animation-mixer></a-gltf-model>
                    <a-gltf-model id="cafeWalk" src="#cWalk" scale="0.3 0.3 0.3" visible="false" animation-mixer></a-gltf-model>
                    <a-gltf-model id="cafeInter" src="#cInter" scale="0.3 0.3 0.3" visible="false" animation-mixer="loop:once; clampWhenFinished:true"></a-gltf-model>
                    <a-gltf-model id="arisEX" src="#exSkill" scale="0.3 0.3 0.3" visible="false" animation-mixer="loop:once; clampWhenFinished:true"></a-gltf-model>
                </a-entity>
            </a-entity>
        </a-entity>
    </a-scene>

    <script>
        const FPS = 24;
        let currentMode = 'combat', isActionActive = false, isEXRunning = false, lastMidTime = 0;
        let cafeVoiceTimeout = null, stopTimer = null;
        let moveData = { x: 0, z: 0, active: false };
        
        // BIẾN NÂNG CẤP: Kiểm tra trạng thái nhấn giữ
        let shouldContinueShooting = false;

        const models = {
            idle: document.querySelector('#arisIdle'), walk: document.querySelector('#arisWalk'),
            stop: document.querySelector('#arisStop'), atkStart: document.querySelector('#arisAtkStart'),
            atkMid: document.querySelector('#arisAtkMid'), atkEnd: document.querySelector('#arisAtkEnd'),
            cIdle: document.querySelector('#cafeIdle'), cWalk: document.querySelector('#cafeWalk'),
            cInter: document.querySelector('#cafeInter'), ex: document.querySelector('#arisEX')
        };

        const actionBtn = document.getElementById('action-btn'), exBtn = document.getElementById('ex-btn');
        const sfxN1 = document.getElementById('snd-gun-1'), sfxN2 = document.getElementById('snd-gun-2'), sfxN3 = document.getElementById('snd-gun-3'), sndEx = document.getElementById('snd-gun-ex');

        function playAnimation(modelKey) {
            const el = models[modelKey];
            if (el.components['animation-mixer']) {
                const mixer = el.components['animation-mixer'].mixer;
                if (mixer) {
                    mixer.stopAllAction();
                    const action = mixer.clipAction(mixer._root.animations[0]);
                    if (action) { 
                        action.reset().play(); 
                        mixer.update(0);
                    }
                }
            }
        }

        function showModel(type) { 
            Object.keys(models).forEach(k => {
                const isTarget = (k === type);
                models[k].setAttribute('visible', isTarget);
                if (!isTarget && ['atkStart', 'atkMid', 'atkEnd', 'ex', 'cInter', 'stop'].includes(k)) {
                    if (models[k].components['animation-mixer'] && models[k].components['animation-mixer'].mixer) {
                        models[k].components['animation-mixer'].mixer.stopAllAction();
                    }
                }
            }); 
            if (type === 'idle' || type === 'cIdle') playAnimation(type);
        }

        function stopSnd(s) { if(s) { s.pause(); s.currentTime = 0; s.loop = false; } }
        function playSnd(s, loop=false) { if(s) { s.pause(); s.currentTime = 0; s.loop = loop; s.play().catch(()=>{}); } }

        function autoCafeVoice() {
            clearTimeout(cafeVoiceTimeout);
            if (currentMode === 'cafe' && !isActionActive && !isEXRunning) {
                const randSnd = document.getElementById(`snd-cafe-${Math.floor(Math.random()*5)+1}`);
                playSnd(randSnd);
            }
            cafeVoiceTimeout = setTimeout(autoCafeVoice, Math.floor(Math.random() * 10000) + 10000);
        }

        // CẢI TIẾN: Bắt đầu chuỗi bắn
        function onAStart(e) {
            if (e.cancelable) e.preventDefault();
            if (isActionActive || isEXRunning) return;
            if (stopTimer) { clearTimeout(stopTimer); stopTimer = null; }

            if (currentMode === 'combat') {
                shouldContinueShooting = true; // Đang giữ nút
                isActionActive = true; moveData.active = false;
                actionBtn.classList.add('active-combat'); 
                startShootingSequence();
            } else {
                isEXRunning = true; moveData.active = false;
                actionBtn.classList.add('active-cafe'); 
                showModel('cInter');
                playAnimation('cInter');
                const randInter = document.getElementById(`snd-inter-${Math.floor(Math.random()*3)+1}`);
                playSnd(randInter);
            }
        }

        function startShootingSequence() {
            showModel('atkStart');
            playAnimation('atkStart');
            playSnd(sfxN1, false);
        }

        // CẢI TIẾN: Kết thúc chuỗi bắn (khi thả nút)
        function onAEnd() {
            if (currentMode === 'combat') {
                shouldContinueShooting = false; // Đã thả nút, nhưng isActionActive vẫn true cho tới khi End xong
            }
        }

        function onEXClick(e) {
            if (e.cancelable) e.preventDefault();
            if (isActionActive || isEXRunning) return;
            if (stopTimer) { clearTimeout(stopTimer); stopTimer = null; }
            isEXRunning = true; moveData.active = false;
            exBtn.classList.add('active-ex'); 
            showModel('ex');
            setTimeout(() => { if(isEXRunning) playSnd(sndEx, true); }, 50); 
            const voices = ['snd-ex-v1','snd-ex-v2','snd-ex-v3','snd-ex-l1','snd-ex-l2','snd-ex-l3'];
            playSnd(document.getElementById(voices[Math.floor(Math.random()*voices.length)]));
            playAnimation('ex');
        }

        // CHUỖI LOGIC BẮN: Start -> Mid
        models.atkStart.addEventListener('animation-finished', () => { 
            if(isActionActive) { 
                showModel('atkMid'); 
                playAnimation('atkMid');
                playSnd(sfxN2, false); 
            } 
        });

        // CHUỖI LOGIC BẮN: Mid -> End
        models.atkMid.addEventListener('animation-finished', () => {
            if(isActionActive) {
                showModel('atkEnd');
                playAnimation('atkEnd');
                playSnd(sfxN3, false);
            }
        });

        // CHUỖI LOGIC BẮN: End -> (Start tiếp hoặc Idle)
        models.atkEnd.addEventListener('animation-finished', () => { 
            if (currentMode === 'combat' && isActionActive) {
                if (shouldContinueShooting) {
                    // Nếu vẫn đang giữ nút, lặp lại chuỗi
                    startShootingSequence();
                } else {
                    // Nếu đã thả nút, kết thúc hoàn toàn
                    isActionActive = false;
                    actionBtn.classList.remove('active-combat');
                    if(!moveData.active) showModel('idle');
                }
            }
        });

        models.stop.addEventListener('animation-finished', () => {
            if (!moveData.active && !isActionActive && !isEXRunning) {
                showModel('idle');
            }
        });
        
        models.ex.addEventListener('animation-finished', () => { isEXRunning = false; exBtn.classList.remove('active-ex'); stopSnd(sndEx); showModel(currentMode === 'combat' ? 'idle' : 'cIdle'); });
        models.cInter.addEventListener('animation-finished', () => { isEXRunning = false; actionBtn.classList.remove('active-cafe'); showModel('cIdle'); });

        document.getElementById('switch-btn').addEventListener('click', () => {
            if (isActionActive || isEXRunning) return;
            currentMode = (currentMode === 'combat') ? 'cafe' : 'combat';
            if (currentMode === 'combat') {
                actionBtn.classList.replace('mode-cafe-icon', 'mode-combat-icon');
                exBtn.style.display = 'flex'; showModel('idle'); clearTimeout(cafeVoiceTimeout);
            } else {
                actionBtn.classList.replace('mode-combat-icon', 'mode-cafe-icon');
                exBtn.style.display = 'none'; showModel('cIdle'); autoCafeVoice();
            }
        });

        actionBtn.addEventListener('touchstart', onAStart); actionBtn.addEventListener('mousedown', onAStart);
        window.addEventListener('touchend', onAEnd); window.addEventListener('mouseup', onAEnd);
        exBtn.addEventListener('click', onEXClick);

        const manager = nipplejs.create({zone: document.getElementById('joystick-zone'), mode: 'static', position: {left: '70px', bottom: '70px'}, color: 'cyan'});
        manager.on('move', (evt, data) => {
            if (isActionActive || isEXRunning) return;
            if (stopTimer) { clearTimeout(stopTimer); stopTimer = null; }
            moveData.active = true; moveData.x = data.vector.x; moveData.z = -data.vector.y;
            showModel(currentMode === 'combat' ? 'walk' : 'cWalk');
        });
        manager.on('end', () => {
            moveData.active = false;
            if (!isActionActive && !isEXRunning) {
                if (currentMode === 'combat') {
                    showModel('stop'); 
                    playAnimation('stop');
                } else showModel('cIdle');
            }
        });

        function update() {
            if (moveData.active && !isActionActive && !isEXRunning) {
                const root = document.querySelector('#aris-root'), rot = document.querySelector('#aris-rotation');
                let currPos = root.getAttribute('position');
                let speed = currentMode === 'combat' ? 0.05 : 0.01;
                currPos.x += moveData.x * speed; currPos.z += moveData.z * speed;
                root.setAttribute('position', currPos);
                rot.setAttribute('rotation', `0 ${Math.atan2(moveData.x, moveData.z) * 57.3} 0`);
            }
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
