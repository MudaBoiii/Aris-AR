<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aris AR - Custom Frame Version</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; }
        #joystick-zone { 
            position: fixed; bottom: 40px; left: 40px; 
            width: 150px; height: 150px; z-index: 2000; 
        }
    </style>
</head>

<body>
    <div id="joystick-zone"></div>

    <a-scene 
        mindar-image="imageTargetSrc: targets.mind; filterMinCF: 0.0001; filterBeta: 0.001; missTolerance: 10000;" 
        color-space="sRGB" 
        renderer="colorManagement: true; antialias: false;" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">

        <a-assets>
            <a-asset-item id="mIdle" src="Walk_Idle.glb"></a-asset-item>
            <a-asset-item id="mWalk" src="Walk.glb"></a-asset-item>
            <a-asset-item id="mStop" src="Walk_Stop.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-entity id="aris-root" position="0 -0.8 0.01">
                <a-entity id="aris-rotation" rotation="0 0 0">
                    <a-gltf-model id="arisIdle" src="#mIdle" scale="0.3 0.3 0.3" visible="true" animation-mixer></a-gltf-model>
                    <a-gltf-model id="arisWalk" src="#mWalk" scale="0.3 0.3 0.3" visible="false" animation-mixer="timeScale: 1.2"></a-gltf-model>
                    <a-gltf-model id="arisStop" src="#mStop" scale="0.3 0.3 0.3" visible="false" animation-mixer="loop: once; clampWhenFinished: true"></a-gltf-model>
                </a-entity>
            </a-entity>
        </a-entity>

        <a-light type="ambient" intensity="1.2"></a-light>
    </a-scene>

    <script>
        const root = document.querySelector('#aris-root');
        const rotWrapper = document.querySelector('#aris-rotation');
        const models = { 
            idle: document.querySelector('#arisIdle'), 
            walk: document.querySelector('#arisWalk'), 
            stop: document.querySelector('#arisStop') 
        };
        
        let pos = { x: 0, y: -0.8, z: 0.01 }; 
        let moveData = { x: 0, z: 0, active: false };
        const moveSpeed = 0.05;

        // --- CẤU HÌNH FRAME TÙY CHỈNH ---
        const FPS = 24;
        const TARGET_STOP_FRAME = 48; // Bạn chỉnh số frame muốn dừng tại đây (ví dụ: 30, 40...)
        const STOP_DURATION_MS = (TARGET_STOP_FRAME / FPS) * 1000;
        // --------------------------------

        const manager = nipplejs.create({
            zone: document.getElementById('joystick-zone'),
            mode: 'static',
            position: { left: '75px', bottom: '75px' },
            color: 'cyan'
        });

        function showModel(type) {
            Object.keys(models).forEach(k => { 
                models[k].setAttribute('visible', k === type); 
            });
        }

        manager.on('move', (evt, data) => {
            moveData.active = true;
            moveData.x = data.vector.x; 
            moveData.z = -data.vector.y; 
            showModel('walk');
        });

        manager.on('end', () => {
            moveData.active = false;
            showModel('stop');
            
            const stopEl = models.stop;
            // Reset animation mixer để chạy lại từ đầu
            stopEl.removeAttribute('animation-mixer');
            stopEl.setAttribute('animation-mixer', {
                clip: '*',
                loop: 'once',
                clampWhenFinished: true
            });

            // Đợi chạy hết số frame đã định rồi mới chuyển sang Idle
            setTimeout(() => {
                if (!moveData.active) {
                    showModel('idle');
                }
            }, STOP_DURATION_MS);
        });

        function update() {
            if (moveData.active) {
                pos.x += moveData.x * moveSpeed;
                pos.z += moveData.z * moveSpeed;
                root.setAttribute('position', `${pos.x} ${pos.y} ${pos.z}`);
                
                let angleRad = Math.atan2(moveData.x, moveData.z);
                let angleDeg = angleRad * (180 / Math.PI);
                rotWrapper.setAttribute('rotation', `0 ${angleDeg} 0`);
            }
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
