<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aris AR - New Axis System</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; }
        #joystick-zone { 
            position: fixed; bottom: 40px; left: 40px; 
            width: 150px; height: 150px; z-index: 2000; 
        }
    </style>
</head>

<body>
    <div id="joystick-zone"></div>

    <a-scene 
        mindar-image="imageTargetSrc: targets.mind; filterMinCF: 0.0001; filterBeta: 0.001; missTolerance: 10000;" 
        color-space="sRGB" 
        renderer="colorManagement: true; antialias: false;" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">

        <a-assets>
            <a-asset-item id="mIdle" src="Walk_Idle.glb"></a-asset-item>
            <a-asset-item id="mWalk" src="Walk.glb"></a-asset-item>
            <a-asset-item id="mStop" src="Walk_Stop.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-entity id="aris-root" position="0 0 0.01">
                
                <a-entity id="aris-rotation" rotation="0 0 0">
                    
                    <a-gltf-model id="arisIdle" src="#mIdle" rotation="0 0 0" scale="0.3 0.3 0.3" visible="true" animation-mixer></a-gltf-model>
                    <a-gltf-model id="arisWalk" src="#mWalk" rotation="0 0 0" scale="0.3 0.3 0.3" visible="false" animation-mixer="timeScale: 1.2"></a-gltf-model>
                    <a-gltf-model id="arisStop" src="#mStop" rotation="0 0 0" scale="0.3 0.3 0.3" visible="false" animation-mixer="loop: once; clampWhenFinished: true"></a-gltf-model>
                
                </a-entity>
            </a-entity>
        </a-entity>

        <a-light type="ambient" intensity="1.2"></a-light>
    </a-scene>

    <script>
        const root = document.querySelector('#aris-root');
        const rotWrapper = document.querySelector('#aris-rotation');
        const models = { 
            idle: document.querySelector('#arisIdle'), 
            walk: document.querySelector('#arisWalk'), 
            stop: document.querySelector('#arisStop') 
        };
        
        // Chuyển sang hệ tọa độ 3D chuẩn: X (ngang), Y (lên trời), Z (xa/gần)
        let pos = { x: 0, y: 0, z: 0.01 }; 
        let moveData = { x: 0, z: 0, active: false, angle: 0 };
        const moveSpeed = 0.05; 
        let stopTimeout;

        const manager = nipplejs.create({
            zone: document.getElementById('joystick-zone'),
            mode: 'static',
            position: { left: '75px', bottom: '75px' },
            color: 'cyan'
        });

        function showModel(type) {
            Object.keys(models).forEach(k => { models[k].setAttribute('visible', k === type); });
        }

        manager.on('move', (evt, data) => {
            clearTimeout(stopTimeout);
            moveData.active = true;
            
            // X là di chuyển ngang
            moveData.x = Math.cos(data.angle.radian);
            // Z âm là đi ra xa (đẩy joystick lên)
            moveData.z = -Math.sin(data.angle.radian);
            
            // Xoay quanh trục Y. NippleJS 90 độ là tiến, ta trừ 90 để khớp hướng 0 của model.
            moveData.angle = data.angle.degree - 90; 
            
            showModel('walk');
        });

        manager.on('end', () => {
            moveData.active = false;
            showModel('stop');
            models.stop.removeAttribute('animation-mixer');
            models.stop.setAttribute('animation-mixer', 'loop: once; clampWhenFinished: true');
            stopTimeout = setTimeout(() => { if (!moveData.active) showModel('idle'); }, 800);
        });

        function update() {
            if (moveData.active) {
                // Di chuyển trên mặt phẳng sàn (X và Z)
                pos.x += moveData.x * moveSpeed;
                pos.z += moveData.z * moveSpeed;
                
                root.setAttribute('position', `${pos.x} ${pos.y} ${pos.z}`);
                
                // Xoay mặt Aris (Xoay quanh trục đứng Y)
                // Cần dùng dấu âm (-) vì hệ trục xoay của A-Frame ngược chiều với Joystick
                rotWrapper.setAttribute('rotation', `0 ${-moveData.angle} 0`);
            }
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
