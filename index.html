<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aris AR - Markerless Pro</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        /* Khu vực Joystick */
        #joystick-zone { 
            position: fixed; bottom: 40px; left: 40px; 
            width: 150px; height: 150px; z-index: 2000; 
        }
        /* Nút Reset để triệu hồi Aris về trước mặt nếu bị lạc */
        #reset-btn {
            position: fixed; top: 20px; right: 20px;
            padding: 12px 24px; background: rgba(0, 255, 255, 0.2);
            color: #00ffff; border: 2px solid #00ffff;
            border-radius: 10px; font-weight: bold; z-index: 2000;
        }
    </style>
</head>

<body>
    <button id="reset-btn">TRIỆU HỒI ARIS</button>
    <div id="joystick-zone"></div>

    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;" 
        vr-mode-ui="enabled: false"
        renderer="antialias: false; logarithmicDepthBuffer: true; colorManagement: true;">

        <a-assets>
            <a-asset-item id="mIdle" src="Walk_Idle.glb"></a-asset-item>
            <a-asset-item id="mWalk" src="Walk.glb"></a-asset-item>
            <a-asset-item id="mStop" src="Walk_Stop.glb"></a-asset-item>
        </a-assets>

        <a-camera id="cam" look-controls="enabled: true" wasd-controls-enabled="false"></a-camera>

        <a-entity id="aris-root" position="0 -1.5 -3"> 
            
            <a-entity id="aris-rotation" rotation="0 0 0">
                
                <a-gltf-model id="arisIdle" src="#mIdle" scale="0.36 0.36 0.36" visible="true" 
                    animation-mixer></a-gltf-model>
                
                <a-gltf-model id="arisWalk" src="#mWalk" scale="0.36 0.36 0.36" visible="false" 
                    animation-mixer="timeScale: 1.2"></a-gltf-model>
                
                <a-gltf-model id="arisStop" src="#mStop" scale="0.36 0.36 0.36" visible="false" 
                    animation-mixer="loop: once; clampWhenFinished: true"></a-gltf-model>
            
            </a-entity>
        </a-entity>

        <a-light type="ambient" intensity="1.5"></a-light>
